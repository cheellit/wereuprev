name: work

on:
  workflow_dispatch:
  push:
    paths:
      - lks.txt
      - .github/workflows/work.yml

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix
        id: build
        run: |
          set -euo pipefail
          matrix=$(grep -vE '^\s*(#|$)' lks.txt \
            | jq -R -s -c 'split("\n") | map(select(length>0)) | to_entries | map({index: (.key+1), url: .value})')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

      - name: Create release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="work-${{ github.run_id }}"
          gh release create "$tag" \
            --title "$tag" \
            --notes "Transcoded H.265 videos from lks.txt (each under 2 GB)."
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  transcode:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version
          ffmpeg -version | head -n 1

      - name: Download and transcode
        env:
          URL: ${{ matrix.item.url }}
          IDX: ${{ matrix.item.index }}
        run: |
          set -euo pipefail
          mkdir -p raw out
          TARGET_BYTES=$((1850 * 1000 * 1000))
          AUDIO_KBPS=128

          yt-dlp \
            -f 'bestvideo+bestaudio/best' \
            --merge-output-format mp4 \
            -o "raw/${IDX}_%(title)s.%(ext)s" \
            "$URL"

          src="$(ls -1 raw/${IDX}_* | head -n 1)"
          echo "Downloaded: $src ($(du -h "$src" | cut -f1))"

          dur="$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$src")"
          dur="${dur%.*}"
          if ! [ "${dur:-0}" -gt 0 ] 2>/dev/null; then dur=1; fi

          total_kbps=$(( (TARGET_BYTES * 8 / 1000) / dur ))
          video_kbps=$(( total_kbps - AUDIO_KBPS ))
          if [ "$video_kbps" -gt 6000 ]; then video_kbps=6000; fi
          if [ "$video_kbps" -lt 200 ]; then video_kbps=200; fi
          echo "Duration ${dur}s -> target video bitrate ${video_kbps}k"

          base="$(basename "${src%.*}")"
          dst="out/${base}.mp4"

          ffmpeg -y -i "$src" -c:v libx265 -b:v "${video_kbps}k" \
            -x265-params pass=1 -an -f mp4 /dev/null
          ffmpeg -y -i "$src" -c:v libx265 -b:v "${video_kbps}k" \
            -x265-params pass=2 -c:a aac -b:a "${AUDIO_KBPS}k" \
            -movflags +faststart "$dst"

          echo "Encoded: $dst ($(du -h "$dst" | cut -f1))"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.setup.outputs.tag }}" out/* --clobber
